services:
  postgres:
    image: postgres:16
    container_name: reklam_proje_postgres
    environment:
      POSTGRES_DB: reklam_proje
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

