server.port=8080

user-service.url=http://user-service:8081
inventory-service.url=http://inventory-service:8082
post-service.url=https://jsonplaceholder.typicode.com

spring.datasource.url=jdbc:postgresql://postgres-db:5432/microservices_db
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
